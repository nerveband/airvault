name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go test ./...
      - run: go build -o airvault .
      - run: ./airvault schema --format json
      - run: ./airvault schema --validate --format json
      - run: ./airvault config defaults --format json
      - run: ./airvault export sqlite --help
      - run: ./airvault backup create --help
      - run: ./airvault test full --out /tmp/airvault-ci-test --overwrite --format json
      - run: ./airvault backup verify --path /tmp/airvault-ci-test/fixture --mode exists --format json
      - run: ./airvault backup verify --path /tmp/airvault-ci-test/fixture --mode sample --sample-size 1 --format json
